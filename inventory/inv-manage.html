<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stock Overview — Inventory Admin</title>
<link rel="stylesheet" href="kpi-style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="inv-firebase.js"></script>
<style>
.inv-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.inv-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.inv-g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:flex-end;}
@media(max-width:700px){.inv-g2,.inv-g3,.inv-g4{grid-template-columns:1fr;}}
@media(min-width:701px) and (max-width:960px){.inv-g3{grid-template-columns:1fr 1fr;}}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray5);}
.f input,.f select,.f textarea{padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--gray9);background:var(--white);transition:.18s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--t5);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.f input[readonly]{background:var(--gray1);color:var(--gray5);}
.fr{display:flex;gap:8px;align-items:flex-end;}.fr .f{flex:1;}
.sbar-wrap{height:7px;background:var(--gray1);border-radius:99px;overflow:hidden;min-width:60px;margin-top:4px;}
.sbar{height:100%;border-radius:99px;transition:width .5s;}
.sbar-ok{background:linear-gradient(90deg,var(--t7),var(--t4));}
.sbar-warn{background:linear-gradient(90deg,var(--warn),#fcd34d);}
.sbar-crit{background:var(--danger);}
.req-card{background:var(--white);border:1px solid var(--gray3);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:.15s;animation:_fu .3s ease both;}
.req-card:hover{border-color:var(--t4);box-shadow:var(--shadow);}
.req-body{flex:1;min-width:0;}
.req-name{font-size:13px;font-weight:700;color:var(--gray9);margin-bottom:4px;}
.req-meta{font-size:11px;color:var(--gray5);display:flex;flex-wrap:wrap;gap:5px;align-items:center;line-height:1.6;}
.alert-row2{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--danger-l);border:1px solid #fca5a5;margin-bottom:6px;animation:_fu .3s ease both;}
.rcv-panel{display:none;background:var(--t0);border:1.5px solid var(--t1);border-radius:var(--r);padding:16px;margin-top:12px;}
.rcv-panel.open{display:block;}
.preview-box{background:var(--gray1);border:1.5px solid var(--gray3);border-radius:var(--r);padding:16px;}
.info-tip{background:var(--t0);border:1px solid var(--t1);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--t7);line-height:1.7;}
.info-tip b{color:var(--t9);}
.cancel-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:700;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.cancel-ov.open{display:flex;}
.cancel-box{background:var(--white);border-radius:14px;padding:24px;width:100%;max-width:430px;box-shadow:0 24px 60px rgba(15,23,42,.22);}
.cancel-box h3{font-size:15px;font-weight:800;color:var(--danger);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.cancel-box textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;resize:none;box-sizing:border-box;transition:.18s;margin-top:4px;}
.cancel-box textarea:focus{outline:none;border-color:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.12);}
.cerr{font-size:12px;color:var(--danger);min-height:16px;margin-top:4px;font-weight:600;}
.cfooter{display:flex;gap:8px;margin-top:16px;}
.cfooter .btn{flex:1;}
tr.row-cancelled td{opacity:.5;text-decoration:line-through;background:#fef2f2!important;}
tr.row-cancelled .no-strike{text-decoration:none!important;opacity:1;font-style:italic;}
tr.i-ok   td:first-child{border-left:3px solid var(--ok);}
tr.i-warn td:first-child{border-left:3px solid var(--warn);}
tr.i-crit td:first-child{border-left:3px solid var(--danger);}
@keyframes _fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.btn-ok{background:var(--ok);color:#fff;} .btn-ok:hover{background:#15803d;}
.btn-danger{background:var(--danger);color:#fff;} .btn-danger:hover{background:#b91c1c;}
.btn-warn{background:var(--warn);color:#fff;} .btn-warn:hover{background:#b45309;}
@media(max-width:640px){.hide-mobile{display:none;}}</style>
</head>
<body>

<header class="kpi-header">
  <div class="brand">
    <i class="fa-solid fa-boxes-stacked"></i>
    Inventory Admin
    <span class="tag">Management</span>
  </div>
  <nav style="display:flex;gap:4px;flex-wrap:wrap;" id="adminName">
    <a href="inv-manage.html" class="active"><i class="fa-solid fa-boxes-stacked"></i> Stock Overview</a>
    <a href="inv-add.html" class=""><i class="fa-solid fa-plus-circle"></i> Add / Receive</a>
    <a href="inv-requests.html" class=""><i class="fa-solid fa-file-circle-plus"></i> Requests <span id="reqNavBadge" class="badge b-warn" style="display:none;padding:2px 6px;font-size:10px;">!</span></a>
    <a href="inv-categories.html" class=""><i class="fa-solid fa-tags"></i> Categories</a>
    <a href="inv-suppliers.html" class=""><i class="fa-solid fa-truck"></i> Suppliers</a>
    <a href="inv-issuelog.html" class=""><i class="fa-solid fa-receipt"></i> Issue Log</a>
    
  </nav>
</header>

<div id="toast"></div>

<main class="kpi-main">

  <!-- KPI Strip -->
  <div class="kpi-row" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
    <div class="kpi-box k-total">
      <div class="kpi-val" id="kTotal">—</div><div class="kpi-lbl">Total Items</div>
    </div>
    <div class="kpi-box k-danger">
      <div class="kpi-val" id="kLow">—</div><div class="kpi-lbl">Low / Critical</div>
    </div>
    <div class="kpi-box k-blue">
      <div class="kpi-val" id="kValue">—</div><div class="kpi-lbl">Inventory Value</div>
    </div>
    <div class="kpi-box k-warn">
      <div class="kpi-val" id="kReqs">—</div><div class="kpi-lbl">Pending Requests</div>
    </div>
  </div>

  <!-- Low Stock Alerts -->
  <div class="card" id="alertSection" style="display:none;margin-bottom:16px;border-left:4px solid var(--danger);">
    <div class="card-header">
      <div class="card-title" style="color:var(--danger);">
        <i class="fa-solid fa-triangle-exclamation"></i> Reorder Alerts
        <span class="badge b-danger" id="alertCnt" style="margin-left:6px;">0</span>
      </div>
    </div>
    <div id="alertList"></div>
  </div>

  <!-- Receive More panel -->
  <div class="rcv-panel" id="rcvPanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:800;color:var(--t7);">
        <i class="fa-solid fa-truck-ramp-box"></i>
        Receive More — <span id="rcvName" style="color:var(--gray9);"></span>
      </div>
      <button class="btn btn-outline btn-sm" id="btnCloseRcv"><i class="fa-solid fa-xmark"></i> Close</button>
    </div>
    <div class="inv-g4">
      <div class="f"><label>Containers Received</label><input id="rcvCount" type="number" step="0.01" min="0.01" value="1"/></div>
      <div class="f"><label>Container Size</label><input id="rcvSizeInfo" readonly/></div>
      <div class="f"><label>Received Date</label><input id="rcvDate" type="date"/></div>
      <button class="btn btn-ok" id="btnConfirmRcv"><i class="fa-solid fa-check"></i> Confirm</button>
    </div>
    <div id="rcvPreview" style="margin-top:10px;font-size:12px;color:var(--t7);font-weight:700;"></div>
  </div>

  <!-- Stock Table -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><i class="fa-solid fa-table-list"></i> Stock Levels</div>
      <div style="display:flex;gap:8px;">
        <a class="btn btn-primary btn-sm" href="inv-add.html"><i class="fa-solid fa-plus"></i> Add Material</a>
        <button class="btn btn-outline btn-sm" id="btnReload"><i class="fa-solid fa-rotate-right"></i> Reload</button>
      </div>
    </div>
    <div class="filters-bar" style="margin-bottom:14px;">
      <input id="searchBox" placeholder="🔍 Search material, category…"
        style="flex:1;min-width:180px;padding:8px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;"/>
      <select id="filterDept">
        <option value="">All Departments</option>
        <option value="HK">HK</option><option value="Pantry">Pantry</option>
        <option value="ME">ME</option><option value="Security">Security</option><option value="EHS">EHS</option>
      </select>
      <select id="filterStock">
        <option value="all">All Stock Levels</option>
        <option value="low">Low / Critical Only</option>
        <option value="ok">Good Stock Only</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Material</th><th class="hide-mobile">Category</th>
          <th>Dept</th><th>Available</th><th class="hide-mobile">Containers</th>
          <th>Stock</th><th class="hide-mobile">Value</th>
          <th class="hide-mobile">Last Received</th><th>Actions</th>
        </tr></thead>
        <tbody id="tblBody">
          <tr><td colspan="10"><div class="loader"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>

let inventoryData=[], rcvItemId=null;

initAuth((user,name)=>{
  document.getElementById('rcvDate').value=localDate();
  loadInventory();
  refreshReqBadge();
});

/* BUG 2 FIX: loadKPIs is called INSIDE loadInventory after data is set */
async function loadInventory(){
  const body=document.getElementById('tblBody');
  body.innerHTML='<tr><td colspan="10"><div class="loader"><div class="spinner"></div></div></td></tr>';
  try{
    const snap=await db.collection('inventory').orderBy('materialName').get();
    inventoryData=snap.docs.map(d=>({_id:d.id,...d.data()}));
    renderTable();
    renderAlerts();
    loadKPIs(); /* FIX: called here after inventoryData is populated */
  }catch(e){
    body.innerHTML=`<tr><td colspan="10" style="color:var(--danger);text-align:center;padding:18px;">Error: ${esc(e.message)}</td></tr>`;
  }
}

function loadKPIs(){
  /* Now inventoryData is always populated when this is called */
  document.getElementById('kTotal').textContent=inventoryData.length;
  document.getElementById('kLow').textContent=inventoryData.filter(r=>isLowStock(r)).length;
  const val=inventoryData.reduce((s,r)=>s+(r.inventoryValue||r.totalMrp||0),0);
  document.getElementById('kValue').textContent=val>=1000?'₹'+(val/1000).toFixed(1)+'K':fmtCurrency(Math.round(val));
  /* Pending requests — async but doesn't block UI */
  db.collection('materialRequests').where('status','==','Pending').get().then(snap=>{
    document.getElementById('kReqs').textContent=snap.size;
    const b=document.getElementById('reqNavBadge');if(b){b.textContent=snap.size;b.style.display=snap.size>0?'':'none';}
  }).catch(()=>{});
}

function renderTable(){
  const body=document.getElementById('tblBody');
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const fd=document.getElementById('filterDept').value;
  const fs=document.getElementById('filterStock').value;
  let rows=inventoryData.filter(r=>{
    if(fd&&r.department!==fd)return false;
    if(q&&!((r.materialName||'')+(r.category||'')+(r.supplierName||'')).toLowerCase().includes(q))return false;
    if(fs==='low'&&!isLowStock(r))return false;
    if(fs==='ok'&&isLowStock(r))return false;
    return true;
  }).sort((a,b)=>stockPct(a)-stockPct(b));
  body.innerHTML='';
  if(!rows.length){body.innerHTML='<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--gray5);"><i class="fa-solid fa-box-open" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px;"></i>No items found</td></tr>';return;}
  rows.forEach((r,i)=>{
    const avail=r.availableQty??r.receivedQty??0,total=r.totalQty??r.receivedQty??avail;
    const perBase=toBaseQty(r.containerSize||0,r.containerUnit||'');
    const ctnrs=perBase>0?(avail/perBase).toFixed(2):'—';
    const pct=stockPct(r),crit=pct<15,low=isLowStock(r);
    const barCls=crit?'sbar-crit':pct<40?'sbar-warn':'sbar-ok';
    const rowCls=crit?'i-crit':pct<40?'i-warn':'i-ok';
    const badge=crit?'<span class="badge b-danger">🔴 Critical</span>':low?'<span class="badge b-warn">⚠️ Low</span>':'<span class="badge b-ok">✅ Good</span>';
    const invVal=r.inventoryValue?fmtCurrency(r.inventoryValue):'—';
    body.insertAdjacentHTML('beforeend',`
      <tr class="${rowCls}" style="animation:_fu .3s ease both;animation-delay:${i*.025}s">
        <td style="color:var(--gray5);font-size:12px;">${i+1}</td>
        <td class="bold">${esc(r.materialName||'—')}</td>
        <td class="hide-mobile" style="color:var(--gray5);font-size:12px;">${esc(r.category||'—')}</td>
        <td><span class="badge b-teal">${esc(r.department||'—')}</span></td>
        <td>
          <div style="font-weight:700;">${esc(baseToHuman(avail,r.containerUnit||''))}</div>
          <div style="font-size:10px;color:var(--gray5);">of ${esc(baseToHuman(total,r.containerUnit||''))}</div>
        </td>
        <td class="hide-mobile" style="text-align:center;font-weight:700;">${ctnrs}</td>
        <td>
          ${badge}
          <div class="sbar-wrap"><div class="sbar ${barCls}" style="width:${Math.min(100,Math.round(pct))}%"></div></div>
          <div style="font-size:10px;color:var(--gray5);margin-top:2px;">${Math.round(pct)}%</div>
        </td>
        <td class="hide-mobile">${invVal}</td>
        <td class="hide-mobile" style="font-size:12px;color:var(--gray5);">${esc(r.lastReceivedDate||r.receivedDate||'—')}</td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <a class="btn btn-outline btn-sm" href="inv-add.html?edit=${r._id}" title="Edit"><i class="fa-solid fa-pen"></i></a>
            <button class="btn btn-ok btn-sm" onclick="openRcv('${r._id}')" title="Receive"><i class="fa-solid fa-truck-ramp-box"></i></button>
            <button class="btn btn-danger btn-sm" onclick="delItem('${r._id}')" title="Delete"><i class="fa-solid fa-trash"></i></button>
          </div>
        </td>
      </tr>`);
  });
}

function renderAlerts(){
  const sec=document.getElementById('alertSection'),list=document.getElementById('alertList');
  const lows=inventoryData.filter(r=>isLowStock(r)).sort((a,b)=>stockPct(a)-stockPct(b));
  document.getElementById('alertCnt').textContent=lows.length;
  if(!lows.length){sec.style.display='none';return;}
  sec.style.display='';list.innerHTML='';
  lows.forEach((r,i)=>{
    const a=r.availableQty??r.receivedQty??0,pct=Math.round(stockPct(r));
    list.insertAdjacentHTML('beforeend',`
      <div class="alert-row2" style="animation-delay:${i*.05}s">
        <i class="fa-solid fa-triangle-exclamation" style="color:var(--danger);font-size:16px;flex-shrink:0;"></i>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:#7f1d1d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(r.materialName||'—')}</div>
          <div style="font-size:11px;color:var(--danger);">${esc(r.department)} · <strong>${esc(baseToHuman(a,r.containerUnit||''))}</strong> left (${pct}%)${r.threshold>0?` · Threshold: ${esc(baseToHuman(r.threshold,r.containerUnit||''))}`:''}
          </div>
        </div>
        <button class="btn btn-warn btn-sm" onclick="openRcv('${r._id}')"><i class="fa-solid fa-truck-ramp-box"></i> Receive</button>
      </div>`);
  });
}

function openRcv(id){
  const item=inventoryData.find(r=>r._id===id);if(!item)return;rcvItemId=id;
  document.getElementById('rcvName').textContent=item.materialName||'—';
  document.getElementById('rcvSizeInfo').value=`${item.containerSize||''} ${item.containerUnit||''} per container`;
  document.getElementById('rcvDate').value=localDate();
  document.getElementById('rcvCount').value='1';document.getElementById('rcvPreview').textContent='';
  const p=document.getElementById('rcvPanel');p.classList.add('open');p.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('rcvCount').focus();
  document.getElementById('rcvCount').oninput=()=>{
    const cnt=parseFloat(document.getElementById('rcvCount').value)||0;
    const addB=toBaseQty(item.containerSize||0,item.containerUnit||'')*cnt;
    const cur=item.availableQty??item.receivedQty??0;
    document.getElementById('rcvPreview').textContent=cnt>0?`Adding ${baseToHuman(addB,item.containerUnit||'')} → New: ${baseToHuman(cur+addB,item.containerUnit||'')}`:'' ;
  };
}
document.getElementById('btnCloseRcv').addEventListener('click',()=>{document.getElementById('rcvPanel').classList.remove('open');rcvItemId=null;});
document.getElementById('btnConfirmRcv').addEventListener('click',async()=>{
  if(!rcvItemId)return;
  const cnt=parseFloat(document.getElementById('rcvCount').value)||0,date=document.getElementById('rcvDate').value||localDate();
  if(cnt<=0){toast('Enter a valid container count','err');return;}
  const btn=document.getElementById('btnConfirmRcv');btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>';
  try{
    await db.runTransaction(async tx=>{
      const ref=db.collection('inventory').doc(rcvItemId);
      const snap=await tx.get(ref);if(!snap.exists)throw new Error('Item not found');
      const cur=snap.data(),perB=toBaseQty(cur.containerSize||0,cur.containerUnit||'');
      const addB=perB*cnt;
      const newAvl=Math.round(((cur.availableQty??cur.receivedQty??0)+addB)*10000)/10000;
      const newRcv=Math.round(((cur.receivedQty??0)+addB)*10000)/10000;
      const newVal=cur.mrp?Math.round((newRcv/perB)*cur.mrp*100)/100:(cur.inventoryValue||0);
      tx.update(ref,{availableQty:newAvl,receivedQty:newRcv,totalQty:newRcv,inventoryValue:newVal,lastReceivedDate:date,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    toast('Stock received and updated');document.getElementById('rcvPanel').classList.remove('open');rcvItemId=null;loadInventory();
  }catch(e){console.error(e);toast('Receive failed: '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i> Confirm';}
});

async function delItem(id){
  if(!confirm('Delete this inventory item permanently?'))return;
  try{await db.collection('inventory').doc(id).delete();toast('Item deleted');loadInventory();}catch(e){toast('Delete failed','err');}
}
document.getElementById('searchBox').addEventListener('input',renderTable);
document.getElementById('filterDept').addEventListener('change',renderTable);
document.getElementById('filterStock').addEventListener('change',renderTable);
document.getElementById('btnReload').addEventListener('click',loadInventory);

</script>
</body>
</html>
