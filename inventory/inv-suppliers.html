<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Suppliers — Inventory Admin</title>
<link rel="stylesheet" href="kpi-style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="inv-firebase.js"></script>
<style>
.inv-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.inv-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.inv-g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:flex-end;}
@media(max-width:700px){.inv-g2,.inv-g3,.inv-g4{grid-template-columns:1fr;}}
@media(min-width:701px) and (max-width:960px){.inv-g3{grid-template-columns:1fr 1fr;}}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray5);}
.f input,.f select,.f textarea{padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--gray9);background:var(--white);transition:.18s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--t5);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.f input[readonly]{background:var(--gray1);color:var(--gray5);}
.fr{display:flex;gap:8px;align-items:flex-end;}.fr .f{flex:1;}
.sbar-wrap{height:7px;background:var(--gray1);border-radius:99px;overflow:hidden;min-width:60px;margin-top:4px;}
.sbar{height:100%;border-radius:99px;transition:width .5s;}
.sbar-ok{background:linear-gradient(90deg,var(--t7),var(--t4));}
.sbar-warn{background:linear-gradient(90deg,var(--warn),#fcd34d);}
.sbar-crit{background:var(--danger);}
.req-card{background:var(--white);border:1px solid var(--gray3);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:.15s;animation:_fu .3s ease both;}
.req-card:hover{border-color:var(--t4);box-shadow:var(--shadow);}
.req-body{flex:1;min-width:0;}
.req-name{font-size:13px;font-weight:700;color:var(--gray9);margin-bottom:4px;}
.req-meta{font-size:11px;color:var(--gray5);display:flex;flex-wrap:wrap;gap:5px;align-items:center;line-height:1.6;}
.alert-row2{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--danger-l);border:1px solid #fca5a5;margin-bottom:6px;animation:_fu .3s ease both;}
.rcv-panel{display:none;background:var(--t0);border:1.5px solid var(--t1);border-radius:var(--r);padding:16px;margin-top:12px;}
.rcv-panel.open{display:block;}
.preview-box{background:var(--gray1);border:1.5px solid var(--gray3);border-radius:var(--r);padding:16px;}
.info-tip{background:var(--t0);border:1px solid var(--t1);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--t7);line-height:1.7;}
.cancel-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:700;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.cancel-ov.open{display:flex;}
.cancel-box{background:var(--white);border-radius:14px;padding:24px;width:100%;max-width:430px;box-shadow:0 24px 60px rgba(15,23,42,.22);}
.cancel-box h3{font-size:15px;font-weight:800;color:var(--danger);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.cancel-box textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;resize:none;box-sizing:border-box;transition:.18s;margin-top:4px;}
.cancel-box textarea:focus{outline:none;border-color:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.12);}
.cerr{font-size:12px;color:var(--danger);min-height:16px;margin-top:4px;font-weight:600;}
.cfooter{display:flex;gap:8px;margin-top:16px;}
.cfooter .btn{flex:1;}
tr.row-cancelled td{opacity:.5;text-decoration:line-through;background:#fef2f2!important;}
tr.row-cancelled .no-strike{text-decoration:none!important;opacity:1;font-style:italic;}
tr.i-ok  td:first-child{border-left:3px solid var(--ok);}
tr.i-warn td:first-child{border-left:3px solid var(--warn);}
tr.i-crit td:first-child{border-left:3px solid var(--danger);}
@keyframes _fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.btn-ok{background:var(--ok);color:#fff;} .btn-ok:hover{background:#15803d;}
.btn-danger{background:var(--danger);color:#fff;} .btn-danger:hover{background:#b91c1c;}
.btn-warn{background:var(--warn);color:#fff;} .btn-warn:hover{background:#b45309;}
@media(max-width:640px){.hide-mobile{display:none;}}</style>
</head>
<body>
<header class="kpi-header">
  <div class="brand">
    <i class="fa-solid fa-boxes-stacked"></i>
    Inventory Admin
    <span class="tag">Management</span>
  </div>
  <nav style="display:flex;gap:4px;flex-wrap:wrap;" id="adminName">
    <a href="inv-manage.html" class=""><i class="fa-solid fa-boxes-stacked"></i> Stock Overview</a>
    <a href="inv-add.html" class=""><i class="fa-solid fa-plus-circle"></i> Add / Receive</a>
    <a href="inv-requests.html" class=""><i class="fa-solid fa-file-circle-plus"></i> Requests <span id="reqNavBadge" class="badge b-warn" style="display:none;padding:2px 6px;font-size:10px;">!</span></a>
    <a href="inv-categories.html" class=""><i class="fa-solid fa-tags"></i> Categories</a>
    <a href="inv-suppliers.html" class="active"><i class="fa-solid fa-truck"></i> Suppliers</a>
    <a href="inv-issuelog.html" class=""><i class="fa-solid fa-receipt"></i> Issue Log</a>
    
  </nav>
</header>
<div id="toast"></div>
<main class="kpi-main">

  <div style="display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start;">

    <!-- Form (sticky) -->
    <div class="card" style="position:sticky;top:74px;">
      <div class="card-title" id="supFormTitle"><i class="fa-solid fa-plus"></i> Add Supplier</div>
      <div class="f" style="margin-bottom:12px;">
        <label>Supplier Name <span style="color:var(--danger)">*</span></label>
        <input id="sName" placeholder="Company / supplier name"/>
      </div>
      <div class="inv-g2" style="margin-bottom:12px;">
        <div class="f"><label>Contact Person</label><input id="sCon" placeholder="Contact name"/></div>
        <div class="f"><label>Phone</label><input id="sPhone" placeholder="+91 XXXXX XXXXX"/></div>
      </div>
      <div class="f" style="margin-bottom:12px;">
        <label>Email</label>
        <input id="sEmail" type="email" placeholder="email@supplier.com"/>
      </div>
      <div class="f" style="margin-bottom:16px;">
        <label>Address</label>
        <textarea id="sAddr" rows="2" placeholder="Full address" style="resize:vertical;"></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btnSaveSup"><i class="fa-solid fa-floppy-disk"></i> Save Supplier</button>
        <button class="btn btn-outline" id="btnClearSup"><i class="fa-solid fa-eraser"></i> Clear</button>
      </div>
    </div>

    <!-- List -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="fa-solid fa-truck"></i> All Suppliers</div>
        <button class="btn btn-outline btn-sm" id="btnRldSup"><i class="fa-solid fa-rotate-right"></i> Reload</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Contact</th><th class="hide-mobile">Phone</th><th class="hide-mobile">Email</th><th>Actions</th></tr></thead>
          <tbody id="supBody">
            <tr><td colspan="5"><div class="loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<script>
let editSupId=null;
initAuth((user,name)=>{loadSups();refreshReqBadge();});
document.getElementById('btnRldSup').addEventListener('click',loadSups);

async function loadSups(){
  const body=document.getElementById('supBody');
  body.innerHTML='<tr><td colspan="5"><div class="loader"><div class="spinner"></div></div></td></tr>';
  try{
    /* No orderBy — sort client-side to avoid index requirement */
    const snap=await db.collection('suppliers').get();
    const docs=[...snap.docs].sort((a,b)=>(a.data().supplierName||'').localeCompare(b.data().supplierName||''));
    body.innerHTML='';
    if(!docs.length){
      body.innerHTML='<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--gray5);"><i class="fa-solid fa-truck" style="font-size:24px;opacity:.3;display:block;margin-bottom:8px;"></i>No suppliers yet</td></tr>';
      return;
    }
    docs.forEach((doc,i)=>{
      const d=doc.data();
      body.insertAdjacentHTML('beforeend',`
        <tr style="animation:_fu .3s ease both;animation-delay:${i*.03}s">
          <td class="bold">${esc(d.supplierName||'—')}</td>
          <td>${esc(d.contactPerson||d.contact||'—')}</td>
          <td class="hide-mobile">${esc(d.phone||'—')}</td>
          <td class="hide-mobile" style="font-size:12px;color:var(--gray5);">${esc(d.email||'—')}</td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-outline btn-sm" onclick="editSup('${doc.id}')"><i class="fa-solid fa-pen"></i></button>
              <button class="btn btn-danger btn-sm" onclick="delSup('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
            </div>
          </td>
        </tr>`);
    });
  }catch(e){
    body.innerHTML=`<tr><td colspan="5" style="color:var(--danger);padding:14px;text-align:center;">Error: ${esc(e.message)}</td></tr>`;
  }
}

async function saveSup(){
  const name=document.getElementById('sName').value.trim();
  if(!name){toast('Supplier name is required','err');return;}
  const data={supplierName:name,contactPerson:document.getElementById('sCon').value.trim(),phone:document.getElementById('sPhone').value.trim(),email:document.getElementById('sEmail').value.trim(),address:document.getElementById('sAddr').value.trim(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  try{
    if(editSupId){
      await db.collection('suppliers').doc(editSupId).update(data);
      toast('Supplier updated');editSupId=null;
      document.getElementById('supFormTitle').innerHTML='<i class="fa-solid fa-plus"></i> Add Supplier';
    }else{
      await db.collection('suppliers').add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast('Supplier added');
    }
    ['sName','sCon','sPhone','sEmail','sAddr'].forEach(id=>document.getElementById(id).value='');
    loadSups();
  }catch(e){console.error(e);toast('Save failed: '+e.message,'err');}
}

async function editSup(id){
  try{
    const doc=await db.collection('suppliers').doc(id).get();if(!doc.exists)return;
    const d=doc.data();
    document.getElementById('sName').value=d.supplierName||'';
    document.getElementById('sCon').value=d.contactPerson||d.contact||'';
    document.getElementById('sPhone').value=d.phone||'';
    document.getElementById('sEmail').value=d.email||'';
    document.getElementById('sAddr').value=d.address||'';
    editSupId=id;
    document.getElementById('supFormTitle').innerHTML='<i class="fa-solid fa-pen"></i> Edit Supplier';
    document.getElementById('sName').focus();
  }catch(e){toast('Load failed','err');}
}

async function delSup(id){
  if(!confirm('Delete this supplier?'))return;
  try{await db.collection('suppliers').doc(id).delete();toast('Deleted');loadSups();}
  catch(e){toast('Delete failed','err');}
}

document.getElementById('btnSaveSup').addEventListener('click',saveSup);
document.getElementById('btnClearSup').addEventListener('click',()=>{
  ['sName','sCon','sPhone','sEmail','sAddr'].forEach(id=>document.getElementById(id).value='');
  editSupId=null;
  document.getElementById('supFormTitle').innerHTML='<i class="fa-solid fa-plus"></i> Add Supplier';
});
</script>
</body>
</html>
