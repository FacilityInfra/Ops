<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Material Requests — Inventory Admin</title>
<link rel="stylesheet" href="kpi-style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="inv-firebase.js"></script>
<style>
.inv-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.inv-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.inv-g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:flex-end;}
@media(max-width:700px){.inv-g2,.inv-g3,.inv-g4{grid-template-columns:1fr;}}
@media(min-width:701px) and (max-width:960px){.inv-g3{grid-template-columns:1fr 1fr;}}
.f{display:flex;flex-direction:column;gap:4px;}
.f label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray5);}
.f input,.f select,.f textarea{padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--gray9);background:var(--white);transition:.18s;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--t5);box-shadow:0 0 0 3px rgba(13,148,136,.12);}
.f input[readonly]{background:var(--gray1);color:var(--gray5);}
.fr{display:flex;gap:8px;align-items:flex-end;}.fr .f{flex:1;}
.sbar-wrap{height:7px;background:var(--gray1);border-radius:99px;overflow:hidden;min-width:60px;margin-top:4px;}
.sbar{height:100%;border-radius:99px;transition:width .5s;}
.sbar-ok{background:linear-gradient(90deg,var(--t7),var(--t4));}
.sbar-warn{background:linear-gradient(90deg,var(--warn),#fcd34d);}
.sbar-crit{background:var(--danger);}
.req-card{background:var(--white);border:1px solid var(--gray3);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;transition:.15s;animation:_fu .3s ease both;}
.req-card:hover{border-color:var(--t4);box-shadow:var(--shadow);}
.req-body{flex:1;min-width:0;}
.req-name{font-size:13px;font-weight:700;color:var(--gray9);margin-bottom:4px;}
.req-meta{font-size:11px;color:var(--gray5);display:flex;flex-wrap:wrap;gap:5px;align-items:center;line-height:1.6;}
.alert-row2{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--danger-l);border:1px solid #fca5a5;margin-bottom:6px;animation:_fu .3s ease both;}
.rcv-panel{display:none;background:var(--t0);border:1.5px solid var(--t1);border-radius:var(--r);padding:16px;margin-top:12px;}
.rcv-panel.open{display:block;}
.preview-box{background:var(--gray1);border:1.5px solid var(--gray3);border-radius:var(--r);padding:16px;}
.info-tip{background:var(--t0);border:1px solid var(--t1);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--t7);line-height:1.7;}
.cancel-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:700;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.cancel-ov.open{display:flex;}
.cancel-box{background:var(--white);border-radius:14px;padding:24px;width:100%;max-width:430px;box-shadow:0 24px 60px rgba(15,23,42,.22);}
.cancel-box h3{font-size:15px;font-weight:800;color:var(--danger);margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.cancel-box textarea{width:100%;padding:9px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;resize:none;box-sizing:border-box;transition:.18s;margin-top:4px;}
.cancel-box textarea:focus{outline:none;border-color:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.12);}
.cerr{font-size:12px;color:var(--danger);min-height:16px;margin-top:4px;font-weight:600;}
.cfooter{display:flex;gap:8px;margin-top:16px;}
.cfooter .btn{flex:1;}
tr.row-cancelled td{opacity:.5;text-decoration:line-through;background:#fef2f2!important;}
tr.row-cancelled .no-strike{text-decoration:none!important;opacity:1;font-style:italic;}
tr.i-ok  td:first-child{border-left:3px solid var(--ok);}
tr.i-warn td:first-child{border-left:3px solid var(--warn);}
tr.i-crit td:first-child{border-left:3px solid var(--danger);}
@keyframes _fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.btn-ok{background:var(--ok);color:#fff;} .btn-ok:hover{background:#15803d;}
.btn-danger{background:var(--danger);color:#fff;} .btn-danger:hover{background:#b91c1c;}
.btn-warn{background:var(--warn);color:#fff;} .btn-warn:hover{background:#b45309;}
@media(max-width:640px){.hide-mobile{display:none;}}</style>
</head>
<body>
<header class="kpi-header">
  <div class="brand">
    <i class="fa-solid fa-boxes-stacked"></i>
    Inventory Admin
    <span class="tag">Management</span>
  </div>
  <nav style="display:flex;gap:4px;flex-wrap:wrap;" id="adminName">
    <a href="inv-manage.html" class=""><i class="fa-solid fa-boxes-stacked"></i> Stock Overview</a>
    <a href="inv-add.html" class=""><i class="fa-solid fa-plus-circle"></i> Add / Receive</a>
    <a href="inv-requests.html" class="active"><i class="fa-solid fa-file-circle-plus"></i> Requests <span id="reqNavBadge" class="badge b-warn" style="display:none;padding:2px 6px;font-size:10px;">!</span></a>
    <a href="inv-categories.html" class=""><i class="fa-solid fa-tags"></i> Categories</a>
    <a href="inv-suppliers.html" class=""><i class="fa-solid fa-truck"></i> Suppliers</a>
    <a href="inv-issuelog.html" class=""><i class="fa-solid fa-receipt"></i> Issue Log</a>
    
  </nav>
</header>
<div id="toast"></div>
<main class="kpi-main">

  <div class="card">
    <div class="card-header" style="flex-wrap:wrap;gap:10px;">
        <div class="card-title"><i class="fa-solid fa-file-circle-plus"></i> Material Requests</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select id="reqDeptFilter" style="padding:8px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;background:var(--white);">
            <option value="">All Departments</option>
            <option value="HK">HK</option>
            <option value="Pantry">Pantry</option>
            <option value="ME">ME</option>
            <option value="Security">Security</option>
            <option value="EHS">EHS</option>
          </select>
          <select id="reqFilter" style="padding:8px 12px;border:1.5px solid var(--gray3);border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;background:var(--white);">
            <option value="Pending">⏳ Pending</option>
            <option value="Approved">✅ Approved</option>
            <option value="Rejected">❌ Rejected</option>
            <option value="">All Requests</option>
          </select>
          <button class="btn btn-outline btn-sm" id="btnRld" title="Reload"><i class="fa-solid fa-rotate-right"></i></button>
          <button class="btn btn-excel btn-sm" id="btnDownloadIndent" style="display:none;" title="Download approved requests as Material Indent Excel">
            <i class="fa-solid fa-file-excel"></i> Download Indent
          </button>
        </div>
      </div>
    <div id="reqList"><div class="loader"><div class="spinner"></div></div></div>
  </div>
</main>
<script>
initAuth((user,name)=>{loadReqs();refreshReqBadge();});
document.getElementById('reqFilter').addEventListener('change',loadReqs);
document.getElementById('reqDeptFilter').addEventListener('change',loadReqs);
document.getElementById('btnRld').addEventListener('click',loadReqs);
document.getElementById('btnDownloadIndent').addEventListener('click',downloadIndent);

async function loadReqs(){
  const container=document.getElementById('reqList');
  container.innerHTML='<div class="loader"><div class="spinner"></div></div>';
  const status=document.getElementById('reqFilter').value;
  const dept=document.getElementById('reqDeptFilter').value;
  try{
    /* No orderBy in Firestore — sort client-side to avoid composite index error */
    let snap;
    if(status){
      snap=await db.collection('materialRequests').where('status','==',status).get();
    }else{
      snap=await db.collection('materialRequests').get();
    }
    /* Client-side dept filter + sort newest first */
    const docs=[...snap.docs]
      .filter(d=>!dept||d.data().department===dept)
      .sort((a,b)=>(b.data().createdAt?.seconds||0)-(a.data().createdAt?.seconds||0));
    container.innerHTML='';
    if(!docs.length){
      container.innerHTML='<div style="text-align:center;padding:32px;color:var(--gray5);"><i class="fa-solid fa-inbox" style="font-size:28px;opacity:.3;display:block;margin-bottom:8px;"></i>No '+(status?status+' ':'')+'requests found'+(dept?' for '+dept:'')+' </div>';
      return;
    }
    /* Cache approved rows visible in current view; toggle indent button */
    _approvedRows=docs.filter(d=>d.data().status==='Approved').map(d=>({id:d.id,...d.data()}));
    const indBtn=document.getElementById('btnDownloadIndent');
    indBtn.style.display=_approvedRows.length>0?'':'none';
    if(_approvedRows.length>0) indBtn.title=`Download indent for ${_approvedRows.length} approved item(s)`;
    docs.forEach((doc,idx)=>{
      const r=doc.data();
      const dt=r.createdAt?.toDate?r.createdAt.toDate():null;
      const iconMap={Approved:'fa-check',Rejected:'fa-xmark',Pending:'fa-clock'};
      const clsMap={Approved:'b-ok',Rejected:'b-danger',Pending:'b-warn'};
      const icon=iconMap[r.status]||'fa-clock',cls=clsMap[r.status]||'b-warn';
      const statusBadge=`<span class="badge ${cls}">${r.status==='Approved'?'✅ Approved':r.status==='Rejected'?'❌ Rejected':'⏳ Pending'}</span>`;
      const actions=r.status==='Pending'?`
        <button class="btn btn-ok btn-sm" onclick="updateStatus('${doc.id}','Approved')"><i class="fa-solid fa-check"></i> Approve</button>
        <button class="btn btn-danger btn-sm" onclick="updateStatus('${doc.id}','Rejected')" style="margin-left:4px;"><i class="fa-solid fa-xmark"></i> Reject</button>`:'';
      container.insertAdjacentHTML('beforeend',`
        <div class="req-card" style="animation-delay:${idx*.04}s">
          <div style="width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;
            background:${r.status==='Approved'?'var(--ok-l)':r.status==='Rejected'?'var(--danger-l)':'var(--warn-l)'};
            color:${r.status==='Approved'?'var(--ok)':r.status==='Rejected'?'var(--danger)':'var(--warn)'};">
            <i class="fa-solid ${icon}"></i>
          </div>
          <div class="req-body">
            <div class="req-name">${esc(r.materialName||'—')}</div>
            <div class="req-meta">
              <span class="badge b-teal">${esc(r.department||'—')}</span>
              <span>${esc(r.category||'—')}</span>·
              <strong>${esc(String(r.requestedQty||'?'))} ${esc(r.requestedUnit||'')}</strong>
              · For: ${esc(r.monthFor||'—')} · By: ${esc(r.requestedBy||'—')}
              ${dt?'· '+fmtDate(dt):''}
              ${r.remarks?'· <em>'+esc(r.remarks)+'</em>':''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            ${statusBadge}${actions}
          </div>
        </div>`);
    });
  }catch(e){
    container.innerHTML=`<div style="color:var(--danger);padding:16px;text-align:center;">Error loading requests: ${esc(e.message)}</div>`;
  }
}
async function updateStatus(id,status){
  try{
    await db.collection('materialRequests').doc(id).update({status,reviewedAt:firebase.firestore.FieldValue.serverTimestamp()});
    toast(`Request ${status.toLowerCase()}`);loadReqs();refreshReqBadge();
  }catch(e){toast('Update failed','err');}
}

/* Cache of currently visible approved requests */
let _approvedRows=[];

/* ═══════════════════════════════════════════════════════════
   DOWNLOAD MATERIAL INDENT  (Excel)
   Columns: SL | Material Name | Unit | Req Qty | Unit Rate (₹) | Total Amount (₹)
   Unit Rate auto-fetched from inventory (mrp field).
   Missing rates left blank for manual entry.
═══════════════════════════════════════════════════════════ */
async function downloadIndent(){
  if(!_approvedRows.length){toast('No approved requests visible — switch filter to Approved','err');return;}
  if(typeof XLSX==='undefined'){toast('Excel library not loaded — refresh page','err');return;}
  const btn=document.getElementById('btnDownloadIndent');
  btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Generating…';
  try{
    /* Fetch all inventory docs to build MRP lookup map */
    const invSnap=await db.collection('inventory').get();
    const invMap={};
    invSnap.forEach(doc=>{
      const d=doc.data();
      const key=(d.materialName||'').trim().toLowerCase()+'|'+(d.department||'').trim().toLowerCase();
      if(!invMap[key]) invMap[key]={mrp:d.mrp||0,unit:d.containerUnit||''};
    });

    /* Header metadata */
    const dept=document.getElementById('reqDeptFilter').value;
    const months=[...new Set(_approvedRows.map(r=>r.monthFor||'').filter(Boolean))];
    const monthLabel=months.length?months.join(', '):'—';
    const todayStr=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});

    /* Build data rows */
    let missingRate=false;
    const dataRows=_approvedRows.map((r,i)=>{
      const key=(r.materialName||'').trim().toLowerCase()+'|'+(r.department||'').trim().toLowerCase();
      const inv=invMap[key]||{};
      const rate=inv.mrp||0;
      const qty=parseFloat(r.requestedQty)||0;
      const unit=r.requestedUnit||inv.unit||'—';
      const total=(rate>0&&qty>0)?Math.round(rate*qty*100)/100:'';
      if(!rate) missingRate=true;
      return[i+1, r.materialName||'—', unit, qty||'', rate||'', total];
    });

    const grandTotal=dataRows.reduce((s,r)=>s+(parseFloat(r[5])||0),0);

    /* Build AOA */
    const aoa=[];
    aoa.push(['MATERIAL INDENT','','','','','']);
    aoa.push(['Carrier EcoEnergy Insights — Facility Management by JLL','','','','','']);
    aoa.push(['Department: '+(dept||'All Depts'),'','Month: '+monthLabel,'','Date: '+todayStr,'']);
    aoa.push(['','','','','','']);
    aoa.push(['SL','Material Name','Unit','Required Qty','Unit Rate (₹)','Total Amount (₹)']);
    dataRows.forEach(r=>aoa.push(r));
    aoa.push(['','GRAND TOTAL','','','',grandTotal>0?grandTotal:'']);
    aoa.push(['','','','','','']);
    if(missingRate){
      aoa.push(['* Unit Rate not found in inventory for some items — please fill manually','','','','','']);
      aoa.push(['','','','','','']);
    }
    aoa.push(['Prepared By','','Verified By','','Approved By','']);
    aoa.push(['','','','','','']);
    aoa.push(['Name & Signature','','Name & Signature','','Name & Signature','']);
    aoa.push(['Date:','','Date:','','Date:','']);

    /* Build worksheet */
    const ws=XLSX.utils.aoa_to_sheet(aoa);

    /* Column widths */
    ws['!cols']=[{wch:6},{wch:34},{wch:12},{wch:14},{wch:14},{wch:16}];

    /* Row heights */
    ws['!rows']=[{hpt:28},{hpt:16},{hpt:16},{hpt:8},{hpt:20}];

    /* Merged cells */
    const totalRow=4+dataRows.length; /* 0-indexed */
    ws['!merges']=[
      {s:{r:0,c:0},e:{r:0,c:5}},   /* Title */
      {s:{r:1,c:0},e:{r:1,c:5}},   /* Org */
      {s:{r:2,c:0},e:{r:2,c:1}},   /* Dept */
      {s:{r:2,c:2},e:{r:2,c:3}},   /* Month */
      {s:{r:2,c:4},e:{r:2,c:5}},   /* Date */
      {s:{r:totalRow,c:0},e:{r:totalRow,c:4}}, /* Grand total label */
    ];
    if(missingRate){
      const noteRow=totalRow+2;
      ws['!merges'].push({s:{r:noteRow,c:0},e:{r:noteRow,c:5}});
    }

    /* Write file */
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Material Indent');
    const deptTag=dept||'All';
    const dateTag=new Date().toISOString().slice(0,10);
    const fname=`Material_Indent_${deptTag}_${dateTag}.xlsx`;
    XLSX.writeFile(wb,fname);
    toast('Indent downloaded: '+fname);
  }catch(e){
    console.error('Indent error:',e);
    toast('Failed to generate indent: '+e.message,'err');
  }finally{
    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-file-excel"></i> Download Indent';
  }
}

</script>
</body>
</html>
